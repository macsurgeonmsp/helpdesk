<!DOCTYPE html>
<html>
<head>

<title>MacSurgeon Helpdesk</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b0b0b;
color:white;
}

nav{
background:#111;
padding:15px;
display:flex;
gap:20px;
}

nav button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.page{
display:none;
padding:30px;
}

.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
text-align:left;
}

tr:hover{
background:#1a1a1a;
cursor:pointer;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
background:#111;
border:1px solid #333;
color:white;
}

button.save{
background:#1e90ff;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
}

button.reply{
background:#28a745;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-content{
background:#111;
padding:30px;
width:600px;
margin:80px auto;
}

</style>

</head>

<body>

<nav>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('tickets')">Tickets</button>
<button onclick="showPage('kb')">Knowledge Base</button>

</nav>


<!-- DASHBOARD -->

<div id="dashboard" class="page active">

<h1>Dashboard</h1>

<p>Total Tickets: <span id="d_total">0</span></p>
<p>Open Tickets: <span id="d_open">0</span></p>
<p>Closed Tickets: <span id="d_closed">0</span></p>

</div>


<!-- TICKETS -->

<div id="tickets" class="page">

<h1>Ticket Queue</h1>

<table>

<thead>

<tr>
<th>ID</th>
<th>Subject</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Priority</th>
</tr>

</thead>

<tbody id="ticketTable"></tbody>

</table>

</div>


<!-- KNOWLEDGE BASE -->

<div id="kb" class="page">

<h1>Knowledge Base</h1>

<div id="kbArticles"></div>

</div>



<!-- TICKET MODAL -->

<div id="ticketModal" class="modal">

<div class="modal-content">

<h2 id="ticketID"></h2>

<label>Subject</label>
<input id="subject">

<label>Name</label>
<input id="name">

<label>Email</label>
<input id="email">

<label>Phone</label>
<input id="phone">

<label>Description</label>
<textarea id="description"></textarea>

<label>Priority</label>
<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<label>Status</label>
<select id="status">
<option value="open">Open</option>
<option value="in_progress">In Progress</option>
<option value="closed">Closed</option>
</select>

<label>Technician Reply</label>
<textarea id="reply"></textarea>

<button class="save" onclick="saveTicket()">Save Ticket</button>

<button class="reply">Send Reply</button>

<button onclick="closeModal()">Close</button>

</div>

</div>


<script>

const API="http://localhost:5000"


function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

if(page=="tickets") loadTickets()
if(page=="dashboard") loadDashboard()
if(page=="kb") loadKB()

}


async function loadDashboard(){

const r=await fetch(API+"/dashboard")
const d=await r.json()

document.getElementById("d_total").innerText=d.total
document.getElementById("d_open").innerText=d.open
document.getElementById("d_closed").innerText=d.closed

}


async function loadTickets(){

const r=await fetch(API+"/tickets")
const tickets=await r.json()

const table=document.getElementById("ticketTable")
table.innerHTML=""

tickets.forEach(t=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${t.id}</td>
<td>${t.subject}</td>
<td>${t.name}</td>
<td>${t.email}</td>
<td>${t.status}</td>
<td>${t.priority}</td>
`

tr.onclick=()=>openTicket(t.id)

table.appendChild(tr)

})

}


async function openTicket(id){

const r=await fetch(API+"/tickets/"+id)
const t=await r.json()

document.getElementById("ticketID").innerText="Ticket #"+t.id

document.getElementById("subject").value=t.subject
document.getElementById("name").value=t.name
document.getElementById("email").value=t.email
document.getElementById("phone").value=t.phone
document.getElementById("description").value=t.description
document.getElementById("priority").value=t.priority
document.getElementById("status").value=t.status
document.getElementById("reply").value=t.reply||""

window.ticketID=id

document.getElementById("ticketModal").style.display="block"

}


function closeModal(){

document.getElementById("ticketModal").style.display="none"

}


async function saveTicket(){

const data={
subject:subject.value,
name:name.value,
email:email.value,
phone:phone.value,
description:description.value,
priority:priority.value,
status:status.value,
reply:reply.value
}

await fetch(API+"/tickets/"+ticketID+"/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("Ticket saved")

closeModal()

loadTickets()

}


async function loadKB(){

const r=await fetch(API+"/kb")
const articles=await r.json()

const container=document.getElementById("kbArticles")

container.innerHTML=""

articles.forEach(a=>{

let div=document.createElement("div")

div.innerHTML=`<h3>${a.title}</h3><pre>${a.content}</pre>`

container.appendChild(div)

})

}


loadDashboard()

</script>

</body>
</html>
