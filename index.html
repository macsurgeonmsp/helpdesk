<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mac Surgeon - Help Desk</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:black;
height:100vh;
position:fixed;
border-right:2px solid #c40000;
display:flex;
flex-direction:column;
}

.logo{
padding:20px;
text-align:center;
border-bottom:1px solid #222;
}

.logo img{
width:160px;
}

.nav a{
color:white;
text-decoration:none;
padding:15px 20px;
display:block;
border-bottom:1px solid #111;
cursor:pointer;
}

.nav a:hover{
background:#161616;
color:#ff2b2b;
}

/* MAIN */
.main{
margin-left:240px;
padding:30px;
width:100%;
}

/* DASHBOARD CARDS */
.status-bar{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.stat-card{
background:#161616;
padding:20px;
border-left:4px solid #c40000;
border-radius:4px;
min-width:200px;
}

.stat-card h3{
margin:0;
color:#ff2b2b;
}

/* TABLE */
.ticket-table{
width:100%;
border-collapse:collapse;
background:#161616;
}

.ticket-table th{
background:#111;
padding:12px;
text-align:left;
}

.ticket-table td{
padding:12px;
border-bottom:1px solid #222;
}

.ticket-table tr:hover{
background:#1d1d1d;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
}

.modal-content{
background:#161616;
margin:5% auto;
padding:30px;
width:60%;
border-left:4px solid #c40000;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
}

/* KB GRID */
.kb-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.kb-card{
background:#161616;
padding:20px;
cursor:pointer;
}

.kb-card:hover{
background:#1d1d1d;
}

/* CHAT */
.chat-box{
background:#161616;
height:350px;
overflow-y:auto;
padding:15px;
margin-bottom:10px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:10px;
background:#0f0f0f;
border:1px solid #333;
color:white;
}

.chat-input button{
padding:10px 20px;
background:#c40000;
border:none;
color:white;
cursor:pointer;
}

/* FLOATING AI */
.ai-bubble{
position:fixed;
bottom:20px;
right:20px;
background:#c40000;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

.page{display:none;}

textarea{
width:100%;
background:#0f0f0f;
border:1px solid #333;
color:white;
padding:10px;
}
</style>

<script>

const API_BASE = "http://192.168.0.66:5000";

/* PAGE NAVIGATION */

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(page).style.display="block";
}

/* LOAD TICKETS */

async function loadTickets(){

const tableBody=document.querySelector(".ticket-table tbody");
if(!tableBody)return;

tableBody.innerHTML="";

try{

const res=await fetch(`${API_BASE}/tickets`);
const tickets=await res.json();

tickets.forEach(ticket=>{

const tr=document.createElement("tr");

tr.onclick=()=>openTicket(ticket.id);

tr.innerHTML=`
<td>#${ticket.id}</td>
<td>${ticket.issue}</td>
<td>${ticket.status}</td>
<td>${ticket.created_at}</td>
`;

tableBody.appendChild(tr);

});

}catch(err){

console.error(err);

tableBody.innerHTML="<tr><td colspan='4'>Error loading tickets</td></tr>";

}

}

/* UPDATE DASHBOARD */

async function updateStats(){

try{

const res=await fetch(`${API_BASE}/tickets`);
const tickets=await res.json();

const open=tickets.filter(t=>t.status==="open").length;
const closed=tickets.filter(t=>t.status==="closed").length;

document.getElementById("openCount").innerText=open;
document.getElementById("closedCount").innerText=closed;
document.getElementById("totalCount").innerText=tickets.length;

}catch(err){

console.error(err);

}

}

/* OPEN TICKET */

async function openTicket(id){

const modal=document.getElementById("ticketModal");
modal.style.display="block";

try{

const res=await fetch(`${API_BASE}/tickets`);
const tickets=await res.json();

const ticket=tickets.find(t=>t.id===id);

document.getElementById("ticketID").innerText=`#${ticket.id}`;
document.getElementById("ticketIssue").innerText=ticket.issue;
document.getElementById("ticketStatus").innerText=ticket.status;
document.getElementById("ticketCreated").innerText=ticket.created_at;
document.getElementById("ticketResponse").value=ticket.response || "";

}catch(err){

console.error(err);

}

}

function closeModal(){
document.getElementById("ticketModal").style.display="none";
}

/* AI CHAT DEMO */

function sendChat(){

let input=document.getElementById("chatInput");
let box=document.getElementById("chatBox");

if(input.value==="")return;

box.innerHTML+=`<p><b>You:</b> ${input.value}</p>`;
box.innerHTML+=`<p><b>AI:</b> Thinking...</p>`;

input.value="";

}

/* INITIAL LOAD */

document.addEventListener("DOMContentLoaded",()=>{

showPage("home");

loadTickets();
updateStats();

setInterval(loadTickets,15000);
setInterval(updateStats,15000);

});

</script>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="macsurgeonpic1.jpg">
</div>

<div class="nav">
<a onclick="showPage('home')">Dashboard</a>
<a onclick="showPage('tickets')">Tickets</a>
<a onclick="showPage('kb')">Knowledge Base</a>
<a onclick="showPage('ai')">AI Assistant</a>
</div>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="home" class="page">

<h1 style="color:#ff2b2b;">Help Desk Dashboard</h1>

<div class="status-bar">

<div class="stat-card">
<h3>Open Tickets</h3>
<p id="openCount">0</p>
</div>

<div class="stat-card">
<h3>Closed Tickets</h3>
<p id="closedCount">0</p>
</div>

<div class="stat-card">
<h3>Total Tickets</h3>
<p id="totalCount">0</p>
</div>

</div>

</div>

<!-- TICKETS -->

<div id="tickets" class="page">

<h1>Ticket Queue</h1>

<table class="ticket-table">

<thead>
<tr>
<th>ID</th>
<th>Issue</th>
<th>Status</th>
<th>Created</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- AI -->

<div id="ai" class="page">

<h1>AI Support Assistant</h1>

<div class="chat-box" id="chatBox">
<p><b>AI:</b> Hello! How can I assist you today?</p>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask the AI...">
<button onclick="sendChat()">Send</button>
</div>

</div>

</div>

<!-- TICKET MODAL -->

<div class="modal" id="ticketModal">

<div class="modal-content">

<span class="close" onclick="closeModal()">X</span>

<h2>Ticket <span id="ticketID"></span></h2>

<p><b>Issue:</b> <span id="ticketIssue"></span></p>
<p><b>Status:</b> <span id="ticketStatus"></span></p>
<p><b>Created:</b> <span id="ticketCreated"></span></p>

<h3>Technician Reply</h3>

<textarea id="ticketResponse" rows="6"></textarea>

<br><br>

<button>Send Reply</button>

</div>

</div>

<div class="ai-bubble" onclick="showPage('ai')">💬</div>

</body>
</html>
